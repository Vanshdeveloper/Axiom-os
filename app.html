<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom OS - Dashboard</title>
    <link rel="stylesheet" href="app-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">

<body>
    <!-- Header -->
    <header class="header">
        <a href="index.html" class="logo">Axiom OS</a>
        <div class="header-right">
            <div class="notion-status">
                <span class="status-dot"></span>
                Notion: Connected
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Input Section -->
        <section class="input-section">
            <div class="input-wrapper">
                <textarea class="input-textarea" id="topic-input" aria-label="Enter study topic for note generation"
                    placeholder="What do you want to revise? (e.g., Rotational Motion formulas...)"></textarea>
            </div>

            <!-- Persona Selector [NEW] -->
            <div class="persona-selector">
                <input type="radio" name="persona" id="student" value="student">
                <label for="student">🎓 Student</label>
                
                <input type="radio" name="persona" id="professor" value="professor" checked>
                <label for="professor">👨‍🏫 Professor</label>
            </div>

            <button class="forge-button" onclick="const topic=document.getElementById('topic-input').value; const persona=document.querySelector('input[name=\'persona\']:checked').value; generateNotesFromUI(topic, persona)" aria-label="Generate study notes from topic input" id="forge-button">
                Forge Notes ✨
            </button>
        </section>

    DOCUMENT PREVIEW CLASSES REFERENCE:
    ================================
    Use these classes to place AI-generated content in the correct locations:

    SECTION CLASSES:
    .document-preview        - Main container for the entire document preview
    .document-header        - Contains breadcrumbs and title
    .document-title         - The main title of the document (h1)
    .breadcrumbs            - Navigation breadcrumbs (e.g., Drafts > Chemistry > Organic)
    .document-content       - Wrapper for all content sections
    .content-grid           - Grid layout for content sections

    SECTION BLOCK CLASSES:
    .section-block          - Individual content section wrapper
    .full-width             - Full width section (spans entire grid)
    .section-header         - Header area of a section
    .section-icon            - Icon placeholder for section
    .section-title          - Title of the section (h2)
    .section-text           - Paragraph/text content area
    .section-text p         - Individual paragraphs inside section

    TABLE CLASSES:
    .conditions-table       - Table for displaying conditions/reactions data
    IMPORTANT: Add data attributes to tables:
    - data-content-type="table" - Identifies this div as a table
    - data-table-name="[descriptive-name]" - Custom name for the table
    - data-table-purpose="[what data it contains]" - Purpose of the table

    CALLOUT CLASSES:
    .protip-callout         - Special tip/pro note callout box
    .protip-label           - Label for the pro tip
    .protip-text            - Text content of the pro tip

    EXAMPLE USAGE:
    <table class="conditions-table" data-content-type="table" data-table-name="reaction-conditions" data-table-purpose="Lists reaction conditions like solvent, temperature, metal, time">
-->

        <div id="pdf-preview-div" role="main" aria-live="polite" aria-label="Document preview area - notes will appear here when generated">
            <p style="text-align: center; color: var(--accent-primary); font-family: 'Space Grotesk', sans-serif; opacity: 0.6; margin-top: 40px;">Your magic notes will appear here... ✨</p>
        </div>

    <!-- Bottom Action Bar -->
    <footer id="footer-action-bar">
        <button class="action-btn primary" onclick="window.saveToNotion()" id="notion-btn" aria-label="Save current notes to your Axiom OS library database (Notion)">Save to Axiom OS ☁️</button>

    <!-- Notification Container -->
